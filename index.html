<!DOCTYPE html>

<style>
    #embedContainer {
      display: none;
      position: fixed;
      width: 100%;

      top: 0;
      left: 0;
    }
    
    #embed {
      width: 100%;
      height: 100%;
      border: none;
    }
</style>

  <script>
    function changeParentIframeSrc(newSrc) {
        const iframe = document.getElementById('embed');
        iframe.src = newSrc;
    }
</script>

    <script> /*shoutout to chat gpt for making this*/
      const embedContainer = document.querySelector('#embedContainer');
      
      function handleKeyPress(event) {
