<title>Untitled</title>
<style>
    #embedContainer {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }
    
    #embed {
      width: 100%;
      height: 100%;
      border: none;
    }
</style>
<script>
    function changeParentIframeSrc(newSrc) {
        const iframe = document.getElementById('embed');
        iframe.src = newSrc;
    }
</script>
<div id="embedContainer">
    <iframe id="embed" src="https://anura.mercurywork.shop/"></iframe>
</div>


<script>
const newWindow = window.open("about:blank", "_blank"); newWindow.addEventListener("load", function() { const iframe = document.createElement("iframe"); iframe.src = window.location.href; newWindow.document.body.appendChild(iframe); });
const embedContainer = document.querySelector('#embedContainer');

function handleKeyPress(event) { if (event.key === 'Escape') { embedContainer.style.display = 'block';


const newTab = window.open("about:blank", "_blank"); const newIframe = document.createElement("iframe"); newIframe.src = window.location.href; newTab.document.body.appendChild(newIframe); } } document.addEventListener('keydown', handleKeyPress);
</script>
