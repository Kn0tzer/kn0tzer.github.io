<!DOCTYPE html>
<html>
<head>
  <title>Untitled</title>
<style>
    #embedContainer {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }
    
    #embed {
      width: 100%;
      height: 100%;
      border: none;
    }
</style>
</head>
<body>
    <div id="embedContainer">
        <iframe id="embed" src="https://anura.mercurywork.shop/ultraviolet/hvtrs8/-wctahfoauoeltcrkeq.aoo/poakgt/lgaeug-eaoe-"></iframe>
      </div>
</body>
<script> /*shoutout to chat gpt for making this*/
  const embedContainer = document.querySelector('#embedContainer');
  
  function handleKeyPress(event) {
    if (event.key === 'Escape') {
      embedContainer.style.display = 'block';
    }
  }
  document.addEventListener('keydown', handleKeyPress);
</script>
</html>
